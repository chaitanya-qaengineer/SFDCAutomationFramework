# =============================================
# SFDC Automation Framework - Configuration
# =============================================

# Browser Settings
browser=chrome
headless=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Application URL
app.url=https://login.salesforce.com

# Screenshot Settings
screenshot.on.failure=true
screenshot.path=src/test/java/screenshots/

# Report Settings
report.path=src/test/java/reports/
report.title=SFDC Automation Test Report
report.name=Test Execution Report

# Logging
log.level=INFO
log.path=logs/
